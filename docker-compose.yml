version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: interviewiq_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - interviewiq_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewiq_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/interview-iq
      - JWT_SECRET=supersecret_interview_iq_key
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
    networks:
      - interviewiq_net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: interviewiq_ai
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - interviewiq_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interviewiq_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - interviewiq_net

volumes:
  mongo_data:

networks:
  interviewiq_net:
    driver: bridge
